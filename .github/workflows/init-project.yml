name: 1. Init Hardcore Android Project

on:
  workflow_dispatch: # Запускается только по кнопке руками

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean old Cordova files
        run: |
          rm -rf app www platforms plugins node_modules
          rm -f config.xml index.html package.json package-lock.json

      - name: Create directories
        run: |
          mkdir -p app/src/main/java/com/example/eiscamera
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Generate settings.gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://jitpack.io" }
              }
          }
          rootProject.name = "EISCamera"
          include ':app'
          EOF

      - name: Generate root build.gradle
        run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

      - name: Generate app build.gradle
        run: |
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.example.eiscamera'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.eiscamera"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              
              def camerax_version = "1.3.1"
              implementation "androidx.camera:camera-core:${camerax_version}"
              implementation "androidx.camera:camera-camera2:${camerax_version}"
              implementation "androidx.camera:camera-lifecycle:${camerax_version}"
              implementation "androidx.camera:camera-view:${camerax_version}"
              
              implementation 'com.github.iamareebjamal:opencv-android:4.3.0'
          }
          EOF

      - name: Generate AndroidManifest.xml
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.camera" android:required="true" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <application
                  android:allowBackup="true"
                  android:label="EIS Camera Pro"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate MainActivity.kt
        run: |
          cat << 'EOF' > app/src/main/java/com/example/eiscamera/MainActivity.kt
          package com.example.eiscamera
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.example.eiscamera.databinding.ActivityMainBinding

          class MainActivity : AppCompatActivity() {
              private lateinit var binding: ActivityMainBinding
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)
              }
          }
          EOF

      - name: Generate activity_main.xml
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout 
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated hardcore native Android architecture"
          git push
