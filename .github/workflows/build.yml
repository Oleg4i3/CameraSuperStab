name: Auto-Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Generate code and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project Structure and Write Code
        run: |
          mkdir -p app/src/main/java/com/example/eiscamera
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap
          
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "EIS Camera"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.eiscamera'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.eiscamera"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  
                  ndk {
                      abiFilters 'arm64-v8a'
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              constraints {
                  implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22")
                  implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22")
              }
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation "androidx.camera:camera-core:1.3.0"
              implementation "androidx.camera:camera-camera2:1.3.0"
              implementation "androidx.camera:camera-lifecycle:1.3.0"
              implementation "androidx.camera:camera-view:1.3.0"
              implementation "com.google.guava:guava:31.1-android"
              implementation 'com.quickbirdstudios:opencv:4.5.3.0'
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-feature android:name="android.hardware.camera" android:required="true" />
              
              <application
                  android:allowBackup="true"
                  android:label="EIS Camera Pro"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout 
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">

              <ImageView
                  android:id="@+id/imageView"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  android:scaleType="fitCenter"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toTopOf="parent" />

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:background="#88000000"
                  android:padding="16dp"
                  app:layout_constraintBottom_toBottomOf="parent">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:layout_marginBottom="12dp">

                      <Button
                          android:id="@+id/resetBtn"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Сброс фокуса"
                          android:backgroundTint="#dc3545"
                          android:textColor="#FFFFFF"
                          android:layout_marginEnd="8dp"/>

                      <Button
                          android:id="@+id/recordBtn"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="🔴 Начать запись"
                          android:backgroundTint="#28a745"
                          android:textColor="#FFFFFF"
                          android:layout_marginStart="8dp"/>
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:gravity="center_vertical">

                      <TextView
                          android:id="@+id/zoomLabel"
                          android:layout_width="80dp"
                          android:layout_height="wrap_content"
                          android:textColor="#FFFFFF"
                          android:text="Зум: 1.5x" />

                      <SeekBar
                          android:id="@+id/zoomSlider"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:max="30"
                          android:progress="5" />
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:gravity="center_vertical">

                      <TextView
                          android:id="@+id/driftLabel"
                          android:layout_width="80dp"
                          android:layout_height="wrap_content"
                          android:textColor="#FFFFFF"
                          android:text="Дрейф: 0.03" />

                      <SeekBar
                          android:id="@+id/driftSlider"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:max="100"
                          android:progress="30" />
                  </LinearLayout>
              </LinearLayout>
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

          cat << 'EOF' > app/src/main/java/com/example/eiscamera/MainActivity.java
          package com.example.eiscamera;

          import android.Manifest;
          import android.content.ContentValues;
          import android.content.pm.PackageManager;
          import android.graphics.Bitmap;
          import android.hardware.camera2.CaptureRequest;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.MediaStore;
          import android.util.Size;
          import android.widget.Button;
          import android.widget.ImageView;
          import android.widget.SeekBar;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.camera.camera2.interop.Camera2Interop;
          import androidx.camera.core.Camera;
          import androidx.camera.core.CameraSelector;
          import androidx.camera.core.ImageAnalysis;
          import androidx.camera.core.ImageProxy;
          import androidx.camera.lifecycle.ProcessCameraProvider;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import com.google.common.util.concurrent.ListenableFuture;

          import org.opencv.android.OpenCVLoader;
          import org.opencv.android.Utils;
          import org.opencv.core.Core;
          import org.opencv.core.CvType;
          import org.opencv.core.Mat;
          import org.opencv.core.Point;
          import org.opencv.core.Rect;
          import org.opencv.core.Scalar;
          import org.opencv.imgproc.Imgproc;
          import org.opencv.videoio.VideoWriter;

          import java.io.File;
          import java.io.FileInputStream;
          import java.io.InputStream;
          import java.io.OutputStream;
          import java.nio.ByteBuffer;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class MainActivity extends AppCompatActivity {
              private ImageView imageView;
              private Button resetBtn, recordBtn;
              private SeekBar zoomSlider, driftSlider;
              private TextView zoomLabel, driftLabel;
              
              private ExecutorService cameraExecutor;

              // Адаптированные под HD (720p) параметры
              private static final int SEARCH_RADIUS = 120;
              private static final int MAX_SHIFT = 100; // Мертвая хватка (разрешаем сильный сдвиг)
              private static final int EDGE_MARGIN = 40;

              private double currentZoom = 1.5;
              private double currentDriftSpeed = 0.03;

              private Mat referenceFrame = null;
              private Mat template = null;
              
              private double virtualX = 0;
              private double virtualY = 0;
              private int lastMatchX = 0;
              private int lastMatchY = 0;
              
              private Integer ghostOffsetX = null;
              private Integer ghostOffsetY = null;
              
              private int actualWidth = 0;
              private int actualHeight = 0;
              private int tmplW = 0;
              private int tmplH = 0;
              private int idealX = 0;
              private int idealY = 0;

              private boolean manualResetRequested = false;
              private boolean isRecording = false;
              private VideoWriter videoWriter = null;
              private String tempVideoPath = null;
              private Bitmap displayBitmap = null;
              
              private long lastFrameTime = 0; // Для Delta Time

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  imageView = findViewById(R.id.imageView);
                  resetBtn = findViewById(R.id.resetBtn);
                  recordBtn = findViewById(R.id.recordBtn);
                  zoomSlider = findViewById(R.id.zoomSlider);
                  driftSlider = findViewById(R.id.driftSlider);
                  zoomLabel = findViewById(R.id.zoomLabel);
                  driftLabel = findViewById(R.id.driftLabel);

                  OpenCVLoader.initDebug();
                  setupUI();

                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) == PackageManager.PERMISSION_GRANTED) {
                      startCamera();
                  } else {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, 10);
                  }

                  cameraExecutor = Executors.newSingleThreadExecutor();
              }

              private void setupUI() {
                  zoomSlider.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          currentZoom = 1.0 + (progress / 10.0);
                          zoomLabel.setText(String.format("Зум: %.1fx", currentZoom));
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  driftSlider.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          currentDriftSpeed = progress / 1000.0;
                          driftLabel.setText(String.format("Дрейф: %.3f", currentDriftSpeed));
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  resetBtn.setOnClickListener(v -> manualResetRequested = true);

                  recordBtn.setOnClickListener(v -> {
                      if (actualWidth == 0 || actualHeight == 0) return;

                      if (!isRecording) {
                          try {
                              File cacheDir = getExternalCacheDir();
                              if (cacheDir == null) cacheDir = getCacheDir();
                              File tempFile = new File(cacheDir, "temp_video.avi");
                              tempVideoPath = tempFile.getAbsolutePath();
                              
                              videoWriter = new VideoWriter(tempVideoPath, VideoWriter.fourcc('M', 'J', 'P', 'G'), 30.0, new org.opencv.core.Size(actualWidth, actualHeight));
                              
                              if (videoWriter.isOpened()) {
                                  isRecording = true;
                                  recordBtn.setText("⏹ Остановить");
                                  recordBtn.setBackgroundColor(0xFFFF0000);
                                  Toast.makeText(this, "Запись начата!", Toast.LENGTH_SHORT).show();
                              } else {
                                  Toast.makeText(this, "Ошибка запуска кодека", Toast.LENGTH_LONG).show();
                              }
                          } catch (Exception e) {
                              Toast.makeText(this, "Ошибка: " + e.getMessage(), Toast.LENGTH_LONG).show();
                          }
                      } else {
                          isRecording = false;
                          recordBtn.setText("⏳ Сохранение...");
                          recordBtn.setEnabled(false);
                          
                          cameraExecutor.execute(() -> {
                              if (videoWriter != null) {
                                  videoWriter.release();
                                  videoWriter = null;
                              }
                              saveVideoToGallery(tempVideoPath);
                              
                              runOnUiThread(() -> {
                                  recordBtn.setEnabled(true);
                                  recordBtn.setText("🔴 Начать запись");
                                  recordBtn.setBackgroundColor(0xFF28A745);
                              });
                          });
                      }
                  });
              }

              private void saveVideoToGallery(String path) {
                  File file = new File(path);
                  if (!file.exists()) return;

                  ContentValues values = new ContentValues();
                  values.put(MediaStore.Video.Media.DISPLAY_NAME, "Stabilized_" + System.currentTimeMillis() + ".avi");
                  values.put(MediaStore.Video.Media.MIME_TYPE, "video/avi");
                  values.put(MediaStore.Video.Media.RELATIVE_PATH, Environment.DIRECTORY_MOVIES + "/EIS_Camera");

                  Uri uri = getContentResolver().insert(MediaStore.Video.Media.EXTERNAL_CONTENT_URI, values);
                  if (uri != null) {
                      try (OutputStream os = getContentResolver().openOutputStream(uri);
                           InputStream is = new FileInputStream(file)) {
                          byte[] buffer = new byte[8192];
                          int read;
                          while ((read = is.read(buffer)) != -1) {
                              os.write(buffer, 0, read);
                          }
                          runOnUiThread(() -> Toast.makeText(this, "✅ Сохранено в Галерею!", Toast.LENGTH_LONG).show());
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }
                  file.delete(); 
              }

              private void startCamera() {
                  ListenableFuture<ProcessCameraProvider> cameraProviderFuture = ProcessCameraProvider.getInstance(this);
                  cameraProviderFuture.addListener(() -> {
                      try {
                          ProcessCameraProvider cameraProvider = cameraProviderFuture.get();
                          
                          ImageAnalysis.Builder builder = new ImageAnalysis.Builder()
                                  .setTargetResolution(new Size(1280, 720)) 
                                  .setBackpressureStrategy(ImageAnalysis.STRATEGY_KEEP_ONLY_LATEST)
                                  .setOutputImageFormat(ImageAnalysis.OUTPUT_IMAGE_FORMAT_RGBA_8888);

                          // СЕКРЕТНОЕ ОРУЖИЕ №1: Отключаем аппаратные OIS и EIS телефона!
                          Camera2Interop.Extender<ImageAnalysis> ext = new Camera2Interop.Extender<>(builder);
                          ext.setCaptureRequestOption(CaptureRequest.LENS_OPTICAL_STABILIZATION_MODE, CaptureRequest.LENS_OPTICAL_STABILIZATION_MODE_OFF);
                          ext.setCaptureRequestOption(CaptureRequest.CONTROL_VIDEO_STABILIZATION_MODE, CaptureRequest.CONTROL_VIDEO_STABILIZATION_MODE_OFF);

                          ImageAnalysis imageAnalysis = builder.build();
                          imageAnalysis.setAnalyzer(cameraExecutor, this::processFrame);
                          
                          cameraProvider.unbindAll();
                          cameraProvider.bindToLifecycle(this, CameraSelector.DEFAULT_BACK_CAMERA, imageAnalysis);
                      } catch (Exception e) { e.printStackTrace(); }
                  }, ContextCompat.getMainExecutor(this));
              }

              private void processFrame(@NonNull ImageProxy image) {
                  // СЕКРЕТНОЕ ОРУЖИЕ №3: Вычисление Delta Time (Плавность независимо от фризов)
                  long currentTime = System.currentTimeMillis();
                  double dt = 1.0;
                  if (lastFrameTime > 0) {
                      dt = (currentTime - lastFrameTime) / 33.333; // Нормализация к 30 FPS
                  }
                  lastFrameTime = currentTime;
                  
                  // СЕКРЕТНОЕ ОРУЖИЕ №2: Трекинг прямо на HD-кадре без "лесенок" округления
                  Mat fullRgba = imageProxyToMat(image);
                  Mat fullGray = new Mat();
                  Imgproc.cvtColor(fullRgba, fullGray, Imgproc.COLOR_RGBA2GRAY);

                  int rotation = image.getImageInfo().getRotationDegrees();
                  if (rotation == 90) {
                      Core.rotate(fullRgba, fullRgba, Core.ROTATE_90_CLOCKWISE);
                      Core.rotate(fullGray, fullGray, Core.ROTATE_90_CLOCKWISE);
                  } else if (rotation == 270) {
                      Core.rotate(fullRgba, fullRgba, Core.ROTATE_90_COUNTERCLOCKWISE);
                      Core.rotate(fullGray, fullGray, Core.ROTATE_90_COUNTERCLOCKWISE);
                  } else if (rotation == 180) {
                      Core.rotate(fullRgba, fullRgba, Core.ROTATE_180);
                      Core.rotate(fullGray, fullGray, Core.ROTATE_180);
                  }

                  if (actualWidth == 0 || actualHeight == 0) {
                      actualWidth = fullRgba.cols();
                      actualHeight = fullRgba.rows();
                      tmplW = actualWidth / 5; // Большой шаблон для точности
                      tmplH = actualHeight / 5;
                      idealX = (actualWidth - tmplW) / 2;
                      idealY = (actualHeight - tmplH) / 2;
                      virtualX = idealX;
                      virtualY = idealY;
                      lastMatchX = idealX;
                      lastMatchY = idealY;
                  }

                  if (referenceFrame == null) {
                      referenceFrame = fullGray.clone();
                      template = new Mat(referenceFrame, new Rect(idealX, idealY, tmplW, tmplH)).clone();
                  }

                  if (manualResetRequested) {
                      triggerSmoothReset(fullGray);
                      manualResetRequested = false;
                  }

                  int roiX = Math.max(0, lastMatchX - SEARCH_RADIUS);
                  int roiY = Math.max(0, lastMatchY - SEARCH_RADIUS);
                  int roiW = Math.min(fullGray.cols() - roiX, tmplW + SEARCH_RADIUS * 2);
                  int roiH = Math.min(fullGray.rows() - roiY, tmplH + SEARCH_RADIUS * 2);

                  Mat searchRoi = new Mat(fullGray, new Rect(roiX, roiY, roiW, roiH));
                  Mat result = new Mat();
                  Imgproc.matchTemplate(searchRoi, template, result, Imgproc.TM_CCOEFF_NORMED);
                  Core.MinMaxLocResult minMax = Core.minMaxLoc(result);

                  int matchX = roiX + (int) minMax.maxLoc.x;
                  int matchY = roiY + (int) minMax.maxLoc.y;

                  double jumpDist = Math.hypot(matchX - lastMatchX, matchY - lastMatchY);
                  boolean isNearEdge = matchX < EDGE_MARGIN || matchX + tmplW > fullGray.cols() - EDGE_MARGIN ||
                                       matchY < EDGE_MARGIN || matchY + tmplH > fullGray.rows() - EDGE_MARGIN;

                  if (minMax.maxVal < 0.4 || isNearEdge || jumpDist > MAX_SHIFT) {
                      triggerSmoothReset(fullGray);
                      matchX = idealX;
                      matchY = idealY;
                  } else {
                      lastMatchX = matchX;
                      lastMatchY = matchY;
                  }

                  // Применяем dt к дрейфу для идеальной кинематики
                  double driftFactor = currentDriftSpeed * dt;
                  if (driftFactor > 1.0) driftFactor = 1.0; // Защита от резкого скачка времени
                  
                  virtualX += (matchX - virtualX) * driftFactor;
                  virtualY += (matchY - virtualY) * driftFactor;

                  double dx = matchX - virtualX;
                  double dy = matchY - virtualY;

                  Mat M = new Mat(2, 3, CvType.CV_64FC1);
                  M.put(0, 0, 1, 0, -dx, 0, 1, -dy);

                  Mat rgbaUI = fullRgba.clone();
                  
                  if (ghostOffsetX != null && ghostOffsetY != null) {
                      int gx = matchX + ghostOffsetX;
                      int gy = matchY + ghostOffsetY;
                      Imgproc.rectangle(rgbaUI, new Point(gx, gy), new Point(gx + tmplW, gy + tmplH), new Scalar(255, 255, 0, 255), 4);
                  }
                  
                  Imgproc.rectangle(rgbaUI, new Point(matchX, matchY), new Point(matchX + tmplW, matchY + tmplH), new Scalar(255, 0, 0, 255), 6);

                  Mat stabilizedClean = new Mat();
                  Imgproc.warpAffine(fullRgba, stabilizedClean, M, new org.opencv.core.Size(actualWidth, actualHeight), Imgproc.INTER_LINEAR, Core.BORDER_CONSTANT, new Scalar(0, 0, 0, 255));

                  Mat stabilizedUI = new Mat();
                  Imgproc.warpAffine(rgbaUI, stabilizedUI, M, new org.opencv.core.Size(actualWidth, actualHeight), Imgproc.INTER_LINEAR, Core.BORDER_CONSTANT, new Scalar(0, 0, 0, 255));

                  // Цифровой кроп (буфер)
                  int cropW = (int) (actualWidth / currentZoom);
                  int cropH = (int) (actualHeight / currentZoom);
                  int startX = Math.max(0, (actualWidth - cropW) / 2);
                  int startY = Math.max(0, (actualHeight - cropH) / 2);
                  Rect cropRect = new Rect(startX, startY, cropW, cropH);
                  org.opencv.core.Size outSize = new org.opencv.core.Size(actualWidth, actualHeight);

                  Mat outputCroppedClean = new Mat(stabilizedClean, cropRect);
                  Mat outputResizedClean = new Mat();
                  Imgproc.resize(outputCroppedClean, outputResizedClean, outSize, 0, 0, Imgproc.INTER_LINEAR);

                  Mat outputCroppedUI = new Mat(stabilizedUI, cropRect);
                  Mat outputResizedUI = new Mat();
                  Imgproc.resize(outputCroppedUI, outputResizedUI, outSize, 0, 0, Imgproc.INTER_LINEAR);

                  if (isRecording && videoWriter != null && videoWriter.isOpened()) {
                      Mat bgr = new Mat();
                      Imgproc.cvtColor(outputResizedClean, bgr, Imgproc.COLOR_RGBA2BGR);
                      videoWriter.write(bgr);
                      bgr.release();
                  }

                  if (displayBitmap == null || displayBitmap.getWidth() != actualWidth || displayBitmap.getHeight() != actualHeight) {
                      displayBitmap = Bitmap.createBitmap(actualWidth, actualHeight, Bitmap.Config.ARGB_8888);
                  }
                  Utils.matToBitmap(outputResizedUI, displayBitmap);
                  runOnUiThread(() -> imageView.setImageBitmap(displayBitmap));

                  fullRgba.release(); fullGray.release(); searchRoi.release(); result.release();
                  M.release(); rgbaUI.release(); 
                  stabilizedClean.release(); stabilizedUI.release();
                  outputCroppedClean.release(); outputResizedClean.release();
                  outputCroppedUI.release(); outputResizedUI.release();
                  image.close();
              }

              private void triggerSmoothReset(Mat grayFrame) {
                  if (template == null) return;
                  
                  ghostOffsetX = lastMatchX - idealX;
                  ghostOffsetY = lastMatchY - idealY;
                  
                  double currentDx = lastMatchX - virtualX;
                  double currentDy = lastMatchY - virtualY;
                  
                  template.release();
                  template = new Mat(grayFrame, new Rect(idealX, idealY, tmplW, tmplH)).clone();
                  
                  virtualX = idealX - currentDx;
                  virtualY = idealY - currentDy;
                  
                  lastMatchX = idealX;
                  lastMatchY = idealY;
              }

              private Mat imageProxyToMat(ImageProxy image) {
                  ByteBuffer buffer = image.getPlanes()[0].getBuffer();
                  byte[] data = new byte[buffer.remaining()];
                  buffer.get(data);
                  Mat rgbaMat = new Mat(image.getHeight(), image.getWidth(), CvType.CV_8UC4);
                  rgbaMat.put(0, 0, data);
                  return rgbaMat;
              }
              
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (isRecording && videoWriter != null) {
                      videoWriter.release();
                  }
              }
          }
          EOF

      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EIS-Camera-APK
          path: app/build/outputs/apk/debug/app-debug.apk
