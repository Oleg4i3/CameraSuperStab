name: Auto-Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Generate code and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project Structure and Write Code
        run: |
          mkdir -p app/src/main/java/com/example/eiscamera
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap
          
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "EIS Camera"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.eiscamera'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.eiscamera"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              constraints {
                  implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22")
                  implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22")
              }
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation "androidx.camera:camera-core:1.3.0"
              implementation "androidx.camera:camera-camera2:1.3.0"
              implementation "androidx.camera:camera-lifecycle:1.3.0"
              implementation "androidx.camera:camera-view:1.3.0"
              implementation "com.google.guava:guava:31.1-android"
              implementation 'com.quickbirdstudios:opencv:4.5.3.0'
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-feature android:name="android.hardware.camera" android:required="true" />
              
              <application
                  android:allowBackup="true"
                  android:label="EIS Camera Pro"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout 
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">

              <ImageView
                  android:id="@+id/imageView"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  android:scaleType="fitCenter"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toTopOf="parent" />

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:background="#88000000"
                  android:padding="16dp"
                  app:layout_constraintBottom_toBottomOf="parent">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:layout_marginBottom="12dp">

                      <Button
                          android:id="@+id/resetBtn"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Сброс фокуса"
                          android:backgroundTint="#dc3545"
                          android:textColor="#FFFFFF"
                          android:layout_marginEnd="8dp"/>

                      <Button
                          android:id="@+id/recordBtn"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="🔴 Начать запись"
                          android:backgroundTint="#28a745"
                          android:textColor="#FFFFFF"
                          android:layout_marginStart="8dp"/>
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:gravity="center_vertical">

                      <TextView
                          android:id="@+id/zoomLabel"
                          android:layout_width="80dp"
                          android:layout_height="wrap_content"
                          android:textColor="#FFFFFF"
                          android:text="Зум: 1.0x" />

                      <SeekBar
                          android:id="@+id/zoomSlider"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:max="30"
                          android:progress="0" />
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:gravity="center_vertical">

                      <TextView
                          android:id="@+id/driftLabel"
                          android:layout_width="80dp"
                          android:layout_height="wrap_content"
                          android:textColor="#FFFFFF"
                          android:text="Дрейф: 0.03" />

                      <SeekBar
                          android:id="@+id/driftSlider"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:max="100"
                          android:progress="30" />
                  </LinearLayout>
              </LinearLayout>
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

          cat << 'EOF' > app/src/main/java/com/example/eiscamera/MainActivity.java
          package com.example.eiscamera;

          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.os.Environment;
          import android.util.Size;
          import android.widget.Button;
          import android.widget.ImageView;
          import android.widget.SeekBar;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.camera.core.Camera;
          import androidx.camera.core.CameraSelector;
          import androidx.camera.core.ImageAnalysis;
          import androidx.camera.core.ImageProxy;
          import androidx.camera.lifecycle.ProcessCameraProvider;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import com.google.common.util.concurrent.ListenableFuture;

          import org.opencv.android.OpenCVLoader;
          import org.opencv.android.Utils;
          import org.opencv.core.Core;
          import org.opencv.core.CvType;
          import org.opencv.core.Mat;
          import org.opencv.core.Point;
          import org.opencv.core.Rect;
          import org.opencv.core.Scalar;
          import org.opencv.imgproc.Imgproc;
          import org.opencv.videoio.VideoWriter;

          import java.io.File;
          import java.nio.ByteBuffer;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class MainActivity extends AppCompatActivity {
              private ImageView imageView;
              private Button resetBtn, recordBtn;
              private SeekBar zoomSlider, driftSlider;
              private TextView zoomLabel, driftLabel;
              
              private ExecutorService cameraExecutor;
              private Camera cameraXInstance;

              private static final int SEARCH_RADIUS = 60;
              private static final int MAX_SHIFT = 60; // Максимальный сдвиг. На это значение мы обрежем края.
              private static final int EDGE_MARGIN = 20;

              private double currentZoom = 1.0;
              private double currentDriftSpeed = 0.03;

              private Mat referenceFrame = null;
              private Mat template = null;
              
              private double virtualX = 0;
              private double virtualY = 0;
              private int lastMatchX = 0;
              private int lastMatchY = 0;
              
              // Динамические переменные для реального разрешения матрицы
              private int actualWidth = 0;
              private int actualHeight = 0;
              private int tmplW = 150;
              private int tmplH = 150;
              private int idealX = 0;
              private int idealY = 0;

              private boolean manualResetRequested = false;
              private boolean isRecording = false;
              private VideoWriter videoWriter = null;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  imageView = findViewById(R.id.imageView);
                  resetBtn = findViewById(R.id.resetBtn);
                  recordBtn = findViewById(R.id.recordBtn);
                  zoomSlider = findViewById(R.id.zoomSlider);
                  driftSlider = findViewById(R.id.driftSlider);
                  zoomLabel = findViewById(R.id.zoomLabel);
                  driftLabel = findViewById(R.id.driftLabel);

                  OpenCVLoader.initDebug();

                  setupUI();

                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) == PackageManager.PERMISSION_GRANTED) {
                      startCamera();
                  } else {
                      // Запрос разрешения при запуске
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, 10);
                  }

                  cameraExecutor = Executors.newSingleThreadExecutor();
              }

              // Обработка ответа пользователя на запрос разрешений
              @Override
              public void onRequestPermissionsResult(int requestCode, @NonNull String[] permissions, @NonNull int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == 10 && grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                      startCamera();
                  } else {
                      Toast.makeText(this, "Приложению необходим доступ к камере!", Toast.LENGTH_LONG).show();
                  }
              }

              private void setupUI() {
                  zoomSlider.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          currentZoom = 1.0 + (progress / 10.0);
                          zoomLabel.setText(String.format("Зум: %.1fx", currentZoom));
                          // Аппаратный зум
                          if (cameraXInstance != null) {
                              cameraXInstance.getCameraControl().setZoomRatio((float) currentZoom);
                          }
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  driftSlider.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override
                      public void onProgressChanged(SeekBar seekBar, int progress, boolean fromUser) {
                          currentDriftSpeed = progress / 1000.0;
                          driftLabel.setText(String.format("Дрейф: %.3f", currentDriftSpeed));
                      }
                      @Override public void onStartTrackingTouch(SeekBar seekBar) {}
                      @Override public void onStopTrackingTouch(SeekBar seekBar) {}
                  });

                  resetBtn.setOnClickListener(v -> manualResetRequested = true);

                  recordBtn.setOnClickListener(v -> {
                      if (actualWidth == 0 || actualHeight == 0) {
                          Toast.makeText(this, "Камера еще не запустилась, подождите", Toast.LENGTH_SHORT).show();
                          return;
                      }

                      if (!isRecording) {
                          try {
                              File moviesDir = getExternalFilesDir(Environment.DIRECTORY_MOVIES);
                              if (moviesDir != null && !moviesDir.exists()) moviesDir.mkdirs();
                              String path = new File(moviesDir, "stabilized_" + System.currentTimeMillis() + ".avi").getAbsolutePath();
                              
                              // Используем точное динамическое разрешение
                              videoWriter = new VideoWriter(path, VideoWriter.fourcc('M', 'J', 'P', 'G'), 30.0, new org.opencv.core.Size(actualWidth, actualHeight));
                              
                              if (videoWriter.isOpened()) {
                                  isRecording = true;
                                  recordBtn.setText("⏹ Остановить");
                                  recordBtn.setBackgroundColor(0xFFFF0000);
                                  Toast.makeText(this, "Запись начата!", Toast.LENGTH_SHORT).show();
                              } else {
                                  Toast.makeText(this, "Ошибка создания кодека видео", Toast.LENGTH_LONG).show();
                              }
                          } catch (Exception e) {
                              Toast.makeText(this, "Ошибка записи: " + e.getMessage(), Toast.LENGTH_LONG).show();
                          }
                      } else {
                          isRecording = false;
                          if (videoWriter != null) videoWriter.release();
                          recordBtn.setText("🔴 Начать запись");
                          recordBtn.setBackgroundColor(0xFF28A745);
                          Toast.makeText(this, "Видео сохранено в папке Movies", Toast.LENGTH_LONG).show();
                      }
                  });
              }

              private void startCamera() {
                  ListenableFuture<ProcessCameraProvider> cameraProviderFuture = ProcessCameraProvider.getInstance(this);
                  cameraProviderFuture.addListener(() -> {
                      try {
                          ProcessCameraProvider cameraProvider = cameraProviderFuture.get();
                          ImageAnalysis imageAnalysis = new ImageAnalysis.Builder()
                                  .setTargetResolution(new Size(1280, 720)) // Запрашиваем HD качество
                                  .setBackpressureStrategy(ImageAnalysis.STRATEGY_KEEP_ONLY_LATEST)
                                  .setOutputImageFormat(ImageAnalysis.OUTPUT_IMAGE_FORMAT_RGBA_8888)
                                  .build();

                          imageAnalysis.setAnalyzer(cameraExecutor, this::processFrame);
                          cameraProvider.unbindAll();
                          cameraXInstance = cameraProvider.bindToLifecycle(this, CameraSelector.DEFAULT_BACK_CAMERA, imageAnalysis);
                          
                          // Применяем стартовый аппаратный зум
                          cameraXInstance.getCameraControl().setZoomRatio((float) currentZoom);
                      } catch (Exception e) { e.printStackTrace(); }
                  }, ContextCompat.getMainExecutor(this));
              }

              private void processFrame(@NonNull ImageProxy image) {
                  Mat rgba = imageProxyToMat(image);
                  Mat gray = new Mat();
                  Imgproc.cvtColor(rgba, gray, Imgproc.COLOR_RGBA2GRAY);

                  int rotation = image.getImageInfo().getRotationDegrees();
                  if (rotation == 90) {
                      Core.rotate(rgba, rgba, Core.ROTATE_90_CLOCKWISE);
                      Core.rotate(gray, gray, Core.ROTATE_90_CLOCKWISE);
                  } else if (rotation == 270) {
                      Core.rotate(rgba, rgba, Core.ROTATE_90_COUNTERCLOCKWISE);
                      Core.rotate(gray, gray, Core.ROTATE_90_COUNTERCLOCKWISE);
                  } else if (rotation == 180) {
                      Core.rotate(rgba, rgba, Core.ROTATE_180);
                      Core.rotate(gray, gray, Core.ROTATE_180);
                  }

                  // Инициализация размеров при первом кадре
                  if (actualWidth == 0 || actualHeight == 0) {
                      actualWidth = rgba.cols();
                      actualHeight = rgba.rows();
                      tmplW = actualWidth / 5;
                      tmplH = actualHeight / 5;
                      idealX = (actualWidth - tmplW) / 2;
                      idealY = (actualHeight - tmplH) / 2;
                      virtualX = idealX;
                      virtualY = idealY;
                      lastMatchX = idealX;
                      lastMatchY = idealY;
                  }

                  if (referenceFrame == null) {
                      referenceFrame = gray.clone();
                      template = new Mat(referenceFrame, new Rect(idealX, idealY, tmplW, tmplH)).clone();
                  }

                  if (manualResetRequested) {
                      triggerSmoothReset(gray);
                      manualResetRequested = false;
                  }

                  int roiX = Math.max(0, lastMatchX - SEARCH_RADIUS);
                  int roiY = Math.max(0, lastMatchY - SEARCH_RADIUS);
                  int roiW = Math.min(rgba.cols() - roiX, tmplW + SEARCH_RADIUS * 2);
                  int roiH = Math.min(rgba.rows() - roiY, tmplH + SEARCH_RADIUS * 2);

                  Mat searchRoi = new Mat(gray, new Rect(roiX, roiY, roiW, roiH));
                  Mat result = new Mat();
                  Imgproc.matchTemplate(searchRoi, template, result, Imgproc.TM_CCOEFF_NORMED);
                  Core.MinMaxLocResult minMax = Core.minMaxLoc(result);

                  int matchX = roiX + (int) minMax.maxLoc.x;
                  int matchY = roiY + (int) minMax.maxLoc.y;

                  double jumpDist = Math.hypot(matchX - lastMatchX, matchY - lastMatchY);
                  boolean isNearEdge = matchX < EDGE_MARGIN || matchX + tmplW > rgba.cols() - EDGE_MARGIN ||
                                       matchY < EDGE_MARGIN || matchY + tmplH > rgba.rows() - EDGE_MARGIN;

                  if (minMax.maxVal < 0.4 || isNearEdge || jumpDist > MAX_SHIFT) {
                      triggerSmoothReset(gray);
                      matchX = idealX;
                      matchY = idealY;
                  } else {
                      lastMatchX = matchX;
                      lastMatchY = matchY;
                  }

                  virtualX += (matchX - virtualX) * currentDriftSpeed;
                  virtualY += (matchY - virtualY) * currentDriftSpeed;

                  Imgproc.rectangle(rgba, new Point(matchX, matchY), new Point(matchX + tmplW, matchY + tmplH), new Scalar(255, 0, 0, 255), 3);

                  double dx = matchX - virtualX;
                  double dy = matchY - virtualY;

                  Mat M = new Mat(2, 3, CvType.CV_64FC1);
                  M.put(0, 0, 1, 0, -dx, 0, 1, -dy);
                  Mat stabilizedSrc = new Mat();
                  Imgproc.warpAffine(rgba, stabilizedSrc, M, new org.opencv.core.Size(actualWidth, actualHeight), Imgproc.INTER_LINEAR, Core.BORDER_CONSTANT, new Scalar(0, 0, 0, 255));

                  // Невидимый фиксированный кроп, чтобы скрыть черные полосы от стабилизации (на размер MAX_SHIFT)
                  int cropW = actualWidth - (MAX_SHIFT * 2);
                  int cropH = actualHeight - (MAX_SHIFT * 2);
                  int startX = MAX_SHIFT;
                  int startY = MAX_SHIFT;

                  Mat outputCropped = new Mat(stabilizedSrc, new Rect(startX, startY, cropW, cropH));
                  Mat outputResized = new Mat();
                  // Растягиваем обратно до начального размера кадра
                  Imgproc.resize(outputCropped, outputResized, new org.opencv.core.Size(actualWidth, actualHeight), 0, 0, Imgproc.INTER_LINEAR);

                  // Запись видео
                  if (isRecording && videoWriter != null && videoWriter.isOpened()) {
                      Mat bgr = new Mat();
                      Imgproc.cvtColor(outputResized, bgr, Imgproc.COLOR_RGBA2BGR);
                      videoWriter.write(bgr);
                      bgr.release();
                  }

                  Bitmap bitmap = Bitmap.createBitmap(outputResized.cols(), outputResized.rows(), Bitmap.Config.ARGB_8888);
                  Utils.matToBitmap(outputResized, bitmap);
                  runOnUiThread(() -> imageView.setImageBitmap(bitmap));

                  rgba.release(); gray.release(); searchRoi.release(); result.release();
                  M.release(); stabilizedSrc.release(); outputCropped.release(); outputResized.release();
                  image.close();
              }

              private void triggerSmoothReset(Mat grayFrame) {
                  if (template == null) return;
                  double currentDx = lastMatchX - virtualX;
                  double currentDy = lastMatchY - virtualY;
                  template.release();
                  template = new Mat(grayFrame, new Rect(idealX, idealY, tmplW, tmplH)).clone();
                  virtualX = idealX - currentDx;
                  virtualY = idealY - currentDy;
                  lastMatchX = idealX;
                  lastMatchY = idealY;
              }

              private Mat imageProxyToMat(ImageProxy image) {
                  ByteBuffer buffer = image.getPlanes()[0].getBuffer();
                  byte[] data = new byte[buffer.remaining()];
                  buffer.get(data);
                  Mat rgbaMat = new Mat(image.getHeight(), image.getWidth(), CvType.CV_8UC4);
                  rgbaMat.put(0, 0, data);
                  return rgbaMat;
              }
              
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (isRecording && videoWriter != null) {
                      videoWriter.release();
                  }
              }
          }
          EOF

      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EIS-Camera-APK
          path: app/build/outputs/apk/debug/app-debug.apk
