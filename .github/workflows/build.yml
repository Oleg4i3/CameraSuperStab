name: Auto-Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку кнопкой вручную

jobs:
  build:
    name: Generate code and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project Structure and Write Code
        run: |
          # Создаем все нужные папки одним махом
          mkdir -p app/src/main/java/com/example/eiscamera
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap
          
          # 1. Пишем settings.gradle
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "EIS Camera"
          include ':app'
          include ':opencv'
          EOF

          # 2. Пишем корневой build.gradle
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'com.android.library' version '8.2.0' apply false
          }
          EOF

          # 3. Пишем gradle.properties
          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          EOF

          # 4. Пишем app/build.gradle
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.eiscamera'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.eiscamera"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation "androidx.camera:camera-core:1.3.0"
              implementation "androidx.camera:camera-camera2:1.3.0"
              implementation "androidx.camera:camera-lifecycle:1.3.0"
              implementation "androidx.camera:camera-view:1.3.0"
              implementation "com.google.guava:guava:31.1-android"
              implementation project(':opencv')
          }
          EOF

          # 5. Пишем AndroidManifest.xml
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-feature android:name="android.hardware.camera" android:required="true" />
              <application
                  android:allowBackup="true"
                  android:label="EIS Camera"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 6. Пишем layout (интерфейс)
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout 
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">
              <ImageView
                  android:id="@+id/imageView"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  android:scaleType="fitCenter"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toTopOf="parent" />
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

          # 7. Пишем MainActivity.java (полный код камеры и стабилизации)
          cat << 'EOF' > app/src/main/java/com/example/eiscamera/MainActivity.java
          package com.example.eiscamera;

          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.util.Size;
          import android.widget.ImageView;
          import android.widget.Toast;

          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.camera.core.CameraSelector;
          import androidx.camera.core.ImageAnalysis;
          import androidx.camera.core.ImageProxy;
          import androidx.camera.lifecycle.ProcessCameraProvider;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import com.google.common.util.concurrent.ListenableFuture;

          import org.opencv.android.OpenCVLoader;
          import org.opencv.android.Utils;
          import org.opencv.core.Core;
          import org.opencv.core.CvType;
          import org.opencv.core.Mat;
          import org.opencv.core.Point;
          import org.opencv.core.Rect;
          import org.opencv.core.Scalar;
          import org.opencv.imgproc.Imgproc;

          import java.nio.ByteBuffer;
          import java.util.concurrent.ExecutionException;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class MainActivity extends AppCompatActivity {
              private ImageView imageView;
              private ExecutorService cameraExecutor;

              private static final int WIDTH = 640;
              private static final int HEIGHT = 480;
              private static final int TMPL_W = 150;
              private static final int TMPL_H = 150;
              private static final int IDEAL_X = (WIDTH - TMPL_W) / 2;
              private static final int IDEAL_Y = (HEIGHT - TMPL_H) / 2;
              private static final int SEARCH_RADIUS = 60;
              private static final int MAX_SHIFT = 40;
              private static final int EDGE_MARGIN = 20;

              private double currentZoom = 1.5;
              private double currentDriftSpeed = 0.03;

              private Mat referenceFrame = null;
              private Mat template = null;
              
              private double virtualX = IDEAL_X;
              private double virtualY = IDEAL_Y;
              private int lastMatchX = IDEAL_X;
              private int lastMatchY = IDEAL_Y;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  imageView = findViewById(R.id.imageView);

                  if (OpenCVLoader.initDebug()) {
                      Toast.makeText(this, "OpenCV Loaded", Toast.LENGTH_SHORT).show();
                  }

                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) == PackageManager.PERMISSION_GRANTED) {
                      startCamera();
                  } else {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, 10);
                  }

                  cameraExecutor = Executors.newSingleThreadExecutor();
              }

              private void startCamera() {
                  ListenableFuture<ProcessCameraProvider> cameraProviderFuture = ProcessCameraProvider.getInstance(this);
                  cameraProviderFuture.addListener(() -> {
                      try {
                          ProcessCameraProvider cameraProvider = cameraProviderFuture.get();
                          ImageAnalysis imageAnalysis = new ImageAnalysis.Builder()
                                  .setTargetResolution(new Size(WIDTH, HEIGHT))
                                  .setBackpressureStrategy(ImageAnalysis.STRATEGY_KEEP_ONLY_LATEST)
                                  .build();

                          imageAnalysis.setAnalyzer(cameraExecutor, this::processFrame);
                          cameraProvider.unbindAll();
                          cameraProvider.bindToLifecycle(this, CameraSelector.DEFAULT_BACK_CAMERA, imageAnalysis);
                      } catch (Exception e) { e.printStackTrace(); }
                  }, ContextCompat.getMainExecutor(this));
              }

              private void processFrame(@NonNull ImageProxy image) {
                  Mat rgba = imageProxyToMat(image);
                  Mat gray = new Mat();
                  Imgproc.cvtColor(rgba, gray, Imgproc.COLOR_RGBA2GRAY);

                  int rotation = image.getImageInfo().getRotationDegrees();
                  if (rotation == 90) {
                      Core.rotate(rgba, rgba, Core.ROTATE_90_CLOCKWISE);
                      Core.rotate(gray, gray, Core.ROTATE_90_CLOCKWISE);
                  } else if (rotation == 270) {
                      Core.rotate(rgba, rgba, Core.ROTATE_90_COUNTERCLOCKWISE);
                      Core.rotate(gray, gray, Core.ROTATE_90_COUNTERCLOCKWISE);
                  } else if (rotation == 180) {
                      Core.rotate(rgba, rgba, Core.ROTATE_180);
                      Core.rotate(gray, gray, Core.ROTATE_180);
                  }

                  if (referenceFrame == null) {
                      referenceFrame = gray.clone();
                      template = new Mat(referenceFrame, new Rect(IDEAL_X, IDEAL_Y, TMPL_W, TMPL_H)).clone();
                  }

                  int roiX = Math.max(0, lastMatchX - SEARCH_RADIUS);
                  int roiY = Math.max(0, lastMatchY - SEARCH_RADIUS);
                  int roiW = Math.min(rgba.cols() - roiX, TMPL_W + SEARCH_RADIUS * 2);
                  int roiH = Math.min(rgba.rows() - roiY, TMPL_H + SEARCH_RADIUS * 2);

                  Mat searchRoi = new Mat(gray, new Rect(roiX, roiY, roiW, roiH));
                  Mat result = new Mat();
                  Imgproc.matchTemplate(searchRoi, template, result, Imgproc.TM_CCOEFF_NORMED);
                  Core.MinMaxLocResult minMax = Core.minMaxLoc(result);

                  int matchX = roiX + (int) minMax.maxLoc.x;
                  int matchY = roiY + (int) minMax.maxLoc.y;

                  double jumpDist = Math.hypot(matchX - lastMatchX, matchY - lastMatchY);
                  boolean isNearEdge = matchX < EDGE_MARGIN || matchX + TMPL_W > rgba.cols() - EDGE_MARGIN ||
                                       matchY < EDGE_MARGIN || matchY + TMPL_H > rgba.rows() - EDGE_MARGIN;

                  if (minMax.maxVal < 0.4 || isNearEdge || jumpDist > MAX_SHIFT) {
                      triggerSmoothReset(gray);
                      matchX = IDEAL_X;
                      matchY = IDEAL_Y;
                  } else {
                      lastMatchX = matchX;
                      lastMatchY = matchY;
                  }

                  virtualX += (matchX - virtualX) * currentDriftSpeed;
                  virtualY += (matchY - virtualY) * currentDriftSpeed;

                  Imgproc.rectangle(rgba, new Point(matchX, matchY), new Point(matchX + TMPL_W, matchY + TMPL_H), new Scalar(255, 0, 0, 255), 3);

                  double dx = matchX - virtualX;
                  double dy = matchY - virtualY;

                  Mat M = new Mat(2, 3, CvType.CV_64FC1);
                  M.put(0, 0, 1, 0, -dx, 0, 1, -dy);
                  Mat stabilizedSrc = new Mat();
                  Imgproc.warpAffine(rgba, stabilizedSrc, M, new org.opencv.core.Size(rgba.cols(), rgba.rows()), Imgproc.INTER_LINEAR, Core.BORDER_CONSTANT, new Scalar(0, 0, 0, 255));

                  double cropRatio = 1.0 / currentZoom;
                  int cropW = (int) (rgba.cols() * cropRatio);
                  int cropH = (int) (rgba.rows() * cropRatio);
                  int startX = Math.max(0, (rgba.cols() - cropW) / 2);
                  int startY = Math.max(0, (rgba.rows() - cropH) / 2);

                  Mat outputCropped = new Mat(stabilizedSrc, new Rect(startX, startY, cropW, cropH));
                  Mat outputResized = new Mat();
                  Imgproc.resize(outputCropped, outputResized, new org.opencv.core.Size(rgba.cols(), rgba.rows()), 0, 0, Imgproc.INTER_LINEAR);

                  Bitmap bitmap = Bitmap.createBitmap(outputResized.cols(), outputResized.rows(), Bitmap.Config.ARGB_8888);
                  Utils.matToBitmap(outputResized, bitmap);
                  runOnUiThread(() -> imageView.setImageBitmap(bitmap));

                  rgba.release(); gray.release(); searchRoi.release(); result.release();
                  M.release(); stabilizedSrc.release(); outputCropped.release(); outputResized.release();
                  image.close();
              }

              private void triggerSmoothReset(Mat grayFrame) {
                  if (template == null) return;
                  double currentDx = lastMatchX - virtualX;
                  double currentDy = lastMatchY - virtualY;
                  template.release();
                  template = new Mat(grayFrame, new Rect(IDEAL_X, IDEAL_Y, TMPL_W, TMPL_H)).clone();
                  virtualX = IDEAL_X - currentDx;
                  virtualY = IDEAL_Y - currentDy;
                  lastMatchX = IDEAL_X;
                  lastMatchY = IDEAL_Y;
              }

              private Mat imageProxyToMat(ImageProxy image) {
                  ImageProxy.PlaneProxy[] planes = image.getPlanes();
                  ByteBuffer yBuffer = planes[0].getBuffer();
                  ByteBuffer uBuffer = planes[1].getBuffer();
                  ByteBuffer vBuffer = planes[2].getBuffer();
                  int ySize = yBuffer.remaining();
                  int uSize = uBuffer.remaining();
                  int vSize = vBuffer.remaining();
                  byte[] nv21 = new byte[ySize + uSize + vSize];
                  yBuffer.get(nv21, 0, ySize);
                  vBuffer.get(nv21, ySize, vSize);
                  uBuffer.get(nv21, ySize + vSize, uSize);
                  Mat yuvMat = new Mat(image.getHeight() + image.getHeight() / 2, image.getWidth(), CvType.CV_8UC1);
                  yuvMat.put(0, 0, nv21);
                  Mat rgbaMat = new Mat();
                  Imgproc.cvtColor(yuvMat, rgbaMat, Imgproc.COLOR_YUV2RGBA_NV21, 4);
                  yuvMat.release();
                  return rgbaMat;
              }
          }
          EOF

      - name: Download and Setup OpenCV SDK Automatically
        run: |
          wget -q https://github.com/opencv/opencv/releases/download/4.8.0/opencv-4.8.0-android-sdk.zip
          unzip -q opencv-4.8.0-android-sdk.zip
          mv OpenCV-android-sdk/sdk opencv
          # Фикс для совместимости старого файла OpenCV с новыми сборщиками:
          sed -i 's/apply plugin: '\''kotlin-android'\''//g' opencv/build.gradle
          sed -i 's/namespace '\''org.opencv'\''//g' opencv/build.gradle
          sed -i '1 i\android { namespace "org.opencv" }' opencv/build.gradle

      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EIS-Camera-APK
          path: app/build/outputs/apk/debug/app-debug.apk
