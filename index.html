<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://docs.opencv.org 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EIS Camera Pro Audio</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; text-align: center; }
        canvas { width: 100%; max-width: 480px; border: 1px solid #444; border-radius: 8px; margin-top: 10px; background: #111; }
        .controls { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; gap: 10px; }
        button { flex: 1; padding: 15px; font-size: 16px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #007bff; }
        .btn-danger { background: #dc3545; }
        .btn-record { background: #28a745; }
        .btn-record.recording { background: #ff0000; animation: blink 1s infinite; }
        .val-badge { background: #444; padding: 3px 6px; border-radius: 4px; font-family: monospace; }
        video { display: none; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="loading" style="color:#ffcc00; margin:20px;">Загрузка OpenCV.js...</div>
    
    <div class="controls">
        <div class="row">
            <button id="startBtn" class="btn-primary" disabled>ЗАПУСТИТЬ КАМЕРУ</button>
            <button id="resetBtn" class="btn-danger" disabled>СБРОС</button>
        </div>
        <div class="row">
            <button id="recordBtn" class="btn-record" disabled>🔴 ЗАПИСЬ СО ЗВУКОМ</button>
        </div>
        <div class="row">
            <label>Дрейф:</label>
            <input type="range" id="driftSlider" min="0" max="0.1" step="0.001" value="0.03">
            <span class="val-badge" id="driftVal">0.03</span>
        </div>
        <div class="row">
            <label>Зум:</label>
            <input type="range" id="zoomSlider" min="1.0" max="4.0" step="0.1" value="1.5">
            <span class="val-badge" id="zoomVal">1.5x</span>
        </div>
    </div>

    <canvas id="canvasOutput" width="640" height="480"></canvas>
    <video id="videoElement" width="640" height="480" autoplay playsinline muted></video>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>

    <script>
        const video = document.getElementById('videoElement');
        const canvasOutput = document.getElementById('canvasOutput');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const recordBtn = document.getElementById('recordBtn');
        
        const zoomSlider = document.getElementById('zoomSlider');
        const driftSlider = document.getElementById('driftSlider');
        
        let isStreaming = false;
        let referenceFrame = null, template = null;
        const WIDTH = 640, HEIGHT = 480, TMPL_W = 150, TMPL_H = 150;
        const IDEAL_X = (WIDTH - TMPL_W) / 2, IDEAL_Y = (HEIGHT - TMPL_H) / 2;
        
        let virtualX = IDEAL_X, virtualY = IDEAL_Y;
        let lastDX = 0, lastDY = 0; // Для сглаживания скачков
        
        let currentZoom = 1.5;
        let currentDriftSpeed = 0.03;

        let mainStream = null; 
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        zoomSlider.oninput = (e) => { 
            currentZoom = parseFloat(e.target.value); 
            document.getElementById('zoomVal').innerText = currentZoom.toFixed(1) + 'x'; 
        };
        driftSlider.oninput = (e) => { 
            currentDriftSpeed = parseFloat(e.target.value); 
            document.getElementById('driftVal').innerText = currentDriftSpeed.toFixed(3); 
        };

        function onOpenCvReady() {
            document.getElementById('loading').style.display = 'none';
            startBtn.disabled = false;
        }

        startBtn.onclick = () => {
            // Запрашиваем и видео, и аудио
            navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, facingMode: "environment" },
                audio: true 
            }).then(stream => {
                mainStream = stream;
                video.srcObject = stream;
                video.play();
                isStreaming = true;
                startBtn.style.display = 'none';
                resetBtn.disabled = false;
                recordBtn.disabled = false;
                video.onloadeddata = () => processVideo();
            }).catch(err => alert("Доступ запрещен: " + err));
        };

        resetBtn.onclick = () => {
            if (referenceFrame) {
                referenceFrame.delete(); template.delete();
                referenceFrame = null; template = null;
                // Сглаживание: НЕ сбрасываем virtualX/Y в центр сразу,
                // а оставляем их такими, чтобы dx/dy сохранились для нового кадра
            }
        };

        function startRecording() {
            recordedChunks = [];
            
            // 1. Берем видео с канваса
            const videoStream = canvasOutput.captureStream(30);
            
            // 2. Берем аудио из основного потока камеры
            const audioTracks = mainStream.getAudioTracks();
            
            // 3. Создаем микс-поток
            const combinedStream = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...audioTracks
            ]);

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = saveVideo;
            
            mediaRecorder.start();
            isRecording = true;
            recordBtn.innerText = "⏹ ОСТАНОВИТЬ";
            recordBtn.classList.add("recording");
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.innerText = "🔴 ЗАПИСЬ СО ЗВУКОМ";
            recordBtn.classList.remove("recording");
        }

        function saveVideo() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `lecture_${Date.now()}.webm`;
            a.click();
        }

        recordBtn.onclick = () => { if(!isRecording) startRecording(); else stopRecording(); };

        function processVideo() {
            if (!isStreaming) return;
            let src = new cv.Mat(HEIGHT, WIDTH, cv.CV_8UC4);
            let gray = new cv.Mat(), result = new cv.Mat(), mask = new cv.Mat();
            let cap = new cv.VideoCapture(video);

            function processFrame() {
                try {
                    let begin = Date.now();
                    cap.read(src);
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

                    // Если якорь потерян или сброшен
                    if (!referenceFrame) {
                        referenceFrame = gray.clone();
                        template = referenceFrame.roi(new cv.Rect(IDEAL_X, IDEAL_Y, TMPL_W, TMPL_H)).clone();
                        
                        // СГЛАЖИВАНИЕ СКАТЧКА: 
                        // Настраиваем виртуальный центр так, чтобы смещение осталось прежним
                        virtualX = IDEAL_X - lastDX;
                        virtualY = IDEAL_Y - lastDY;
                    }

                    cv.matchTemplate(gray, template, result, cv.TM_CCOEFF_NORMED, mask);
                    let minMax = cv.minMaxLoc(result, mask);
                    
                    if (minMax.maxVal < 0.45) { // Порог уверенности
                        resetBtn.click(); setTimeout(processFrame, 0); return;
                    }

                    let matchX = minMax.maxLoc.x;
                    let matchY = minMax.maxLoc.y;

                    // Вычисляем текущее смещение
                    lastDX = matchX - virtualX;
                    lastDY = matchY - virtualY;
                    
                    // Дрейф к центру
                    virtualX += (matchX - virtualX) * currentDriftSpeed;
                    virtualY += (matchY - virtualY) * currentDriftSpeed;

                    // Отрисовка рамки (для контроля)
                    cv.rectangle(src, new cv.Point(matchX, matchY), 
                                 new cv.Point(matchX + TMPL_W, matchY + TMPL_H), 
                                 [255, 0, 0, 255], 2);

                    // Трансформация
                    let M = cv.matFromArray(2, 3, cv.CV_64FC1, [1, 0, -lastDX, 0, 1, -lastDY]);
                    let stabilized = new cv.Mat();
                    cv.warpAffine(src, stabilized, M, new cv.Size(WIDTH, HEIGHT), cv.INTER_LINEAR, cv.BORDER_CONSTANT, [0,0,0,255]);

                    // Зум/Кроп
                    let cropW = Math.floor(WIDTH / currentZoom);
                    let cropH = Math.floor(HEIGHT / currentZoom);
                    let cropRect = new cv.Rect((WIDTH-cropW)/2, (HEIGHT-cropH)/2, cropW, cropH);
                    
                    let cropped = stabilized.roi(cropRect);
                    let final = new cv.Mat();
                    cv.resize(cropped, final, new cv.Size(WIDTH, HEIGHT));

                    cv.imshow('canvasOutput', final);

                    M.delete(); stabilized.delete(); cropped.delete(); final.delete();
                    
                    let delay = 1000/30 - (Date.now() - begin);
                    setTimeout(processFrame, delay > 0 ? delay : 0);
                } catch (e) { console.log(e); }
            }
            processFrame();
        }
    </script>
</body>
</html>
